name: Android Release Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build signed release APK and AAB
    runs-on: ubuntu-latest

    # Signing values are exposed to every step (including the release unit-test
    # step, which configures the release variant) so the build's signing guard
    # is satisfied throughout the job.
    env:
      ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/fuelnivo-release-key.p12
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android Platform 35 and Build Tools 35.0.0
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper (if missing)
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.11.1
          fi

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/fuelnivo-release-key.p12"

      - name: Run unit tests
        run: ./gradlew testReleaseUnitTest --no-daemon

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/fuelnivo-release-key.p12
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Build signed release AAB
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/fuelnivo-release-key.p12
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew bundleRelease --no-daemon

      - name: Locate release APK
        id: find_apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "No release APK found" >&2
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "Found APK at $APK_PATH"

      - name: Verify APK signature and certificate
        run: |
          BUILD_TOOLS=$(ls -d "$ANDROID_HOME"/build-tools/35.0.0)
          APKSIGNER="$BUILD_TOOLS/apksigner"
          echo "Using $APKSIGNER"
          "$APKSIGNER" verify --print-certs "${{ steps.find_apk.outputs.apk_path }}" | tee certs.txt
          if grep -q "CN=Android Debug" certs.txt; then
            echo "ERROR: Release artifact is signed with the Android Debug certificate." >&2
            exit 1
          fi
          echo "Signature verification passed."

      - name: Upload signed APK (test artifact)
        uses: actions/upload-artifact@v4
        with:
          name: fuelnivo-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload signed AAB (Google Play artifact)
        uses: actions/upload-artifact@v4
        with:
          name: fuelnivo-release-aab
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
